<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Floating Navigation Bar</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Awesome for minimalist icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style data-purpose="layout-and-masking">
    body {
      background-color: #000000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding-bottom: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Container for the floating navigation */
    .nav-container {
      position: relative;
      width: 92%;
      max-width: 400px;
      height: 70px;
    }

    /* The pill-shaped background with the circular cutout (masking logic) */
    .nav-background {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(30, 30, 30, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      /* CSS Mask to create the circular notch for the AI button */
      mask: radial-gradient(circle 38px at 50% 0%, transparent 100%, black 100%);
      -webkit-mask: radial-gradient(circle 38px at 50% 0, transparent 40px, black 41px);
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* The actual content (icons) sitting above the masked background */
    .nav-content {
      position: relative;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 100%;
      padding: 0 24px;
    }

    /* Central AI Button with high-end gradient */
    .ai-button-container {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
    }

    .ai-button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #232526 0%, #414345 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #333;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    /* High-end gradient text/logo effect */
    .ai-logo {
      font-weight: 700;
      font-size: 1.25rem;
      background: linear-gradient(to right, #8e9eab, #eef2f3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    /* Reflective ring inside the AI button */
    .ai-button::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }
  </style>
<style data-purpose="typography-and-icons">
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #888;
      transition: color 0.2s ease;
      width: 50px;
    }

    .nav-item.active {
      color: #fff;
    }

    .nav-item i {
      font-size: 1.1rem;
    }

    .nav-item span {
      font-size: 0.65rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
<!-- BEGIN: Floating Navigation Component -->
<div class="nav-container" data-purpose="navigation-wrapper">
<!-- The central AI Button positioned above the notch -->
<div class="ai-button-container">
<button class="ai-button" id="ai-action-button">
<span class="ai-logo">RK</span>
</button>
</div>
<!-- The masked background layer -->
<div class="nav-background"></div>
<!-- The interactive icons layer -->
<nav class="nav-content">
<!-- Left side icons -->
<div class="flex gap-8">
<a class="nav-item active" data-purpose="nav-home" href="#">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>
<a class="nav-item" data-purpose="nav-search" href="#">
<i class="fa-solid fa-magnifying-glass"></i>
<span>Search</span>
</a>
</div>
<!-- Right side icons -->
<div class="flex gap-8">
<a class="nav-item" data-purpose="nav-library" href="#">
<i class="fa-solid fa-lines-leaning rotate-90"></i>
<span>Library</span>
</a>
<a class="nav-item" data-purpose="nav-liked" href="#">
<i class="fa-solid fa-heart"></i>
<span>Liked</span>
</a>
</div>
</nav>
</div>
<!-- END: Floating Navigation Component -->
<script data-purpose="active-state-handler">
    // Simple script to handle active state visual feedback
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>
</body></html>
