		<!-- Critical inline CSS: safe-area variables + base reset -->
		<style>

			/* Skeleton pulse — used before CSS loads */
			.skeleton-pulse {
				background: rgba(255,255,255,0.1);
				animation: skeletonPulse 2.5s ease-in-out infinite;
			}
			@keyframes skeletonPulse {
				0%, 100% { opacity: 1; }
				50% { opacity: 0.5; }
			}
		</style>

		<!-- iOS PWA viewport height fix + standalone detection -->
		<script>
			// Fix iOS Safari 100vh (includes browser chrome in vh unit)
			function setVH() {
				document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
			}
			setVH();
			window.addEventListener('resize', setVH, { passive: true });
			window.addEventListener('orientationchange', setVH, { passive: true });

			// Mark standalone PWA mode on <html> for CSS targeting
			var isPWA = window.navigator.standalone === true ||
				window.matchMedia('(display-mode: standalone)').matches;
			if (isPWA) document.documentElement.classList.add('is-pwa');
